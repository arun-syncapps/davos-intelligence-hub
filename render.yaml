services:
  - type: web
    name: davos-intelligence-hub
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5001
      - key: DATABASE_PATH
        value: /var/data/davos.db
    disk:
      name: davos-db
      mountPath: /var/data
      sizeGB: 1
